# --- QMIX + AttnComm-L2 with self-inclusive communication ---

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000

runner: "episode"

buffer_size: 5000

# update the target network every {} episodes
target_update_interval: 200

# use the Q_Learner to train
agent_output_type: "q"
agent: "attncomm_rnn"
learner: "q_learner"
double_q: True
mixer: "qmix"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

# Stable AttnComm-L2 ablation
attn_comm_enabled: True
attn_comm_layers: 2
attn_comm_hidden_dim: 64
attn_comm_dropout: 0.0
attn_comm_source_mode: "self_inclusive"
record_comm_attn_weights: False

name: "qmix_attncomm_l2_self"
